name: docs-sync

on:
  pull_request:
    paths:
      - "skills/**"
      - "agents/**"
      - "commands/**"
      - "README.md"
      - ".github/workflows/docs-sync.yml"
  push:
    branches: [main]

jobs:
  readme-roster-drift:
    name: README roster matches disk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skills, agents, and commands are documented
        shell: bash
        run: |
          set -euo pipefail
          fail=0

          check_file_mentioned() {
            local file="$1" label="$2"
            local name
            name=$(basename "$file" .md)
            if ! grep -qF "\`${name}\`" README.md; then
              echo "::error file=README.md::${label} on disk but missing from README: ${name}"
              fail=1
            fi
          }

          check_mention_exists() {
            local name="$1" dir="$2" label="$3"
            if [[ ! -f "${dir}/${name}.md" ]]; then
              echo "::error file=README.md::${label} \`${name}\` mentioned in README but no file at ${dir}/${name}.md"
              fail=1
            fi
          }

          # Disk → README (every file should appear in a backtick)
          for f in skills/factory-*.md;       do check_file_mentioned "$f" "Skill"; done
          for f in agents/*.md;               do check_file_mentioned "$f" "Agent"; done
          for f in commands/*.md;             do
            name=$(basename "$f" .md)
            if ! grep -qE "^- \`/${name}( |\`)" README.md; then
              echo "::error file=README.md::Command on disk but missing from README slash-commands list: /${name}"
              fail=1
            fi
          done

          # README → disk (every mentioned skill/agent file should exist)
          for name in $(grep -oE '\`factory-[a-z-]+\`' README.md | tr -d '`' | sort -u); do
            check_mention_exists "$name" "skills" "Skill"
          done
          for name in $(grep -oE '\`[a-z-]+-(architect|engineer|specialist|builder|reviewer)\`' README.md | tr -d '`' | sort -u); do
            check_mention_exists "$name" "agents" "Agent"
          done

          if [[ $fail -ne 0 ]]; then
            echo ""
            echo "README is out of sync with disk. Update README.md or the affected directory."
            exit 1
          fi
          echo "README roster matches disk."
